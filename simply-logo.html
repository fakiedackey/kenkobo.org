<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIMPLY — Logo Animation</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#050507;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
  canvas{display:block;cursor:pointer}
  #hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,60,60,0.3);font:12px/1 'Courier New',monospace;letter-spacing:3px;text-transform:uppercase;pointer-events:none;opacity:0;transition:opacity 0.8s}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click to replay</div>
<script>
(() => {
const WORD = 'SIMPLY';
const SW = 52, SH = 84, LW = 4.2, INS = 5;
const VIS_GAP = 16;

const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
let W, H, DPR;
function resize() {
  DPR = devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  cvs.width = W*DPR; cvs.height = H*DPR;
  cvs.style.width = W+'px'; cvs.style.height = H+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize(); addEventListener('resize', resize);

function segPts(s) {
  const w=SW, h=SH, m=h/2, n=INS;
  return {
    a:[[n,0],[w-n,0]], b:[[w,n],[w,m-n]], c:[[w,m+n],[w,h-n]],
    d:[[n,h],[w-n,h]], e:[[0,m+n],[0,h-n]], f:[[0,n],[0,m-n]],
    g1:[[n,m],[w/2-2,m]], g2:[[w/2+2,m],[w-n,m]],
    h:[[n+1,n+1],[w/2-2,m-2]], i:[[w/2,n],[w/2,m-n]],
    j:[[w-n-1,n+1],[w/2+2,m-2]], k:[[n+1,h-n-1],[w/2-2,m+2]],
    l:[[w/2,m+n],[w/2,h-n]], m:[[w-n-1,h-n-1],[w/2+2,m+2]],
  }[s];
}

const ALL = 'a b c d e f g1 g2 h i j l'.split(' ');

const CM = {
  S:['a','f','g1','g2','c','d'],
  I:['a','i','l','d'],
  M:['e','f','h','j','b','c'],
  P:['a','b','f','e','g1','g2'],
  L:['f','e','d'],
  Y:['h','j','l'],
};

const BOUNDS = {
  S: [0, SW],
  I: [INS, SW-INS],
  M: [0, SW],
  P: [0, SW],
  L: [0, SW-INS],
  Y: [INS+1, SW-INS-1],
};

const KERN_PAIRS = { 'LY': -8, 'PL': -2 };

const T = { FI:0, FE:0.7, PS:0.7, PE:2.0, SS:2.0, SE:3.4, GLOW:3.8, HOLD:4.5 };

let letters=[], deadSegs=[], masterX, masterY;

function build() {
  letters=[]; deadSegs=[];
  masterX=(W-SW)/2; masterY=(H-SH)/2;

  const usedSet = new Set();
  const positions = [];
  let cursor = 0;

  for (let ci=0; ci<WORD.length; ci++) {
    const ch = WORD[ci];
    const b = BOUNDS[ch] || [0, SW];
    const charSegs = CM[ch] || [];
    for (const s of charSegs) usedSet.add(s);

    if (ci === 0) {
      cursor = -b[0];
    } else {
      const prevCh = WORD[ci-1];
      const prevB = BOUNDS[prevCh] || [0, SW];
      const pair = prevCh + ch;
      const kern = KERN_PAIRS[pair] || 0;
      cursor = positions[ci-1] + prevB[1] + VIS_GAP + kern - b[0];
    }
    positions.push(cursor);
  }

  const lastB = BOUNDS[WORD[WORD.length-1]] || [0, SW];
  const firstB = BOUNDS[WORD[0]] || [0, SW];
  const totalVisW = positions[positions.length-1] + lastB[1] - (positions[0] + firstB[0]);
  const firstVisLeft = positions[0] + firstB[0];
  const offsetX = (W - totalVisW) / 2 - firstVisLeft;
  const oy = (H-SH)/2;

  for (let ci=0; ci<WORD.length; ci++) {
    const charSegs = CM[WORD[ci]] || [];
    const dstX = positions[ci] + offsetX;
    const distFromCenter = Math.abs(ci - (WORD.length-1)/2);
    letters.push({ segs:charSegs, srcX:masterX, dstX, y:oy, delay:distFromCenter*0.06 });
  }
  for (const s of ALL) { if(!usedSet.has(s)) deadSegs.push(s); }
}

const easeOut = t => 1-(1-t)**3;
const easeIn  = t => t*t*t;
const easeIO  = t => t<.5 ? 4*t*t*t : 1-(-2*t+2)**3/2;
const clamp   = (v,lo,hi) => Math.max(lo,Math.min(hi,v));

function drawSeg(x1,y1,x2,y2,alpha,glow) {
  if(alpha<0.01) return;
  ctx.save();
  ctx.globalAlpha=Math.min(1,alpha);
  ctx.lineCap='round';
  ctx.lineWidth=LW+2;
  ctx.strokeStyle=`rgba(255,50,40,${alpha*0.3*glow})`;
  ctx.shadowColor=`rgba(255,70,50,${glow*0.9})`;
  ctx.shadowBlur=14+glow*12;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.shadowBlur=6;
  ctx.lineWidth=LW;
  ctx.strokeStyle=`rgba(255,45,35,${alpha})`;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.shadowBlur=0;
  ctx.lineWidth=LW*0.35;
  ctx.strokeStyle=`rgba(255,190,180,${alpha*0.55})`;
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
  ctx.restore();
}

function drawCell(segList,cx,cy,alpha,glow) {
  for(const s of segList){const p=segPts(s);drawSeg(p[0][0]+cx,p[0][1]+cy,p[1][0]+cx,p[1][1]+cy,alpha,glow);}
}

// ─── AUDIO: cyberpunk buzz + crystalline chime (no initial bell) ───
function playAudio() {
  try {
    const ac=new(AudioContext||webkitAudioContext)(),now=ac.currentTime;

    // Reverb
    const convLen=ac.sampleRate*2.5;
    const convBuf=ac.createBuffer(2,convLen,ac.sampleRate);
    for(let ch=0;ch<2;ch++){const d=convBuf.getChannelData(ch);for(let i=0;i<convLen;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/convLen,2.5)*0.25;}
    const conv=ac.createConvolver();conv.buffer=convBuf;
    const rg=ac.createGain();rg.gain.value=0.2;conv.connect(rg).connect(ac.destination);
    const dry=ac.createGain();dry.gain.value=0.7;dry.connect(ac.destination);dry.connect(conv);

    // ═══ BUZZ LAYER ═══
    const bz1=ac.createOscillator();bz1.type='sawtooth';
    bz1.frequency.setValueAtTime(55,now);bz1.frequency.exponentialRampToValueAtTime(110,now+2.5);
    const bz1f=ac.createBiquadFilter();bz1f.type='lowpass';bz1f.Q.value=4;
    bz1f.frequency.setValueAtTime(180,now);bz1f.frequency.exponentialRampToValueAtTime(1200,now+1.8);
    bz1f.frequency.exponentialRampToValueAtTime(300,now+3.5);
    const bz1g=ac.createGain();
    bz1g.gain.setValueAtTime(0,now);bz1g.gain.linearRampToValueAtTime(0.09,now+0.6);
    bz1g.gain.linearRampToValueAtTime(0.07,now+2);bz1g.gain.linearRampToValueAtTime(0,now+4.5);
    bz1.connect(bz1f).connect(bz1g).connect(dry);bz1.start(now);bz1.stop(now+4.6);

    const bz2=ac.createOscillator();bz2.type='sawtooth';
    bz2.frequency.setValueAtTime(55.3,now);bz2.frequency.exponentialRampToValueAtTime(110.5,now+2.5);
    const bz2g=ac.createGain();
    bz2g.gain.setValueAtTime(0,now);bz2g.gain.linearRampToValueAtTime(0.05,now+0.6);
    bz2g.gain.linearRampToValueAtTime(0.04,now+2);bz2g.gain.linearRampToValueAtTime(0,now+4.5);
    bz2.connect(bz1f);
    bz2.start(now);bz2.stop(now+4.6);

    const drone=ac.createOscillator();drone.type='square';
    drone.frequency.setValueAtTime(27.5,now);
    const droneF=ac.createBiquadFilter();droneF.type='lowpass';droneF.frequency.value=120;droneF.Q.value=1;
    const droneG=ac.createGain();
    droneG.gain.setValueAtTime(0,now);droneG.gain.linearRampToValueAtTime(0.06,now+0.8);
    droneG.gain.linearRampToValueAtTime(0.04,now+2.5);droneG.gain.linearRampToValueAtTime(0,now+4.5);
    drone.connect(droneF).connect(droneG).connect(ac.destination);drone.start(now);drone.stop(now+4.6);

    // ═══ HIGH SHIMMER (gradual, no bell attack) ═══
    const shimF=[3520,4186,5274];
    for(let i=0;i<shimF.length;i++){
      const o=ac.createOscillator();o.type='sine';o.frequency.value=shimF[i];o.detune.value=(Math.random()-0.5)*15;
      const g=ac.createGain();g.gain.setValueAtTime(0,now);g.gain.linearRampToValueAtTime(0,now+0.5);
      g.gain.linearRampToValueAtTime(0.010,now+1.5);g.gain.linearRampToValueAtTime(0.006,now+2);
      g.gain.exponentialRampToValueAtTime(0.0001,now+4.5);
      o.connect(g).connect(dry);o.start(now);o.stop(now+4.6);
    }

    // ═══ SPLIT MOMENT: chime + buzz swell ═══
    const ct=now+2.0;

    // Chime hit at split
    const chF=[1760,2093,2637,3520,4186],chA=[0.07,0.05,0.04,0.035,0.025],chD=[2.5,2,1.5,1.2,0.8];
    for(let i=0;i<chF.length;i++){
      const o=ac.createOscillator();o.type='sine';o.frequency.value=chF[i];o.detune.value=(Math.random()-0.5)*6;
      const g=ac.createGain();g.gain.setValueAtTime(0,ct);g.gain.linearRampToValueAtTime(chA[i],ct+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001,ct+chD[i]);
      o.connect(g).connect(dry);o.start(ct);o.stop(ct+chD[i]+0.1);
    }

    // Metallic zing
    const nLen=ac.sampleRate*0.06,nBuf=ac.createBuffer(1,nLen,ac.sampleRate),nd=nBuf.getChannelData(0);
    for(let i=0;i<nLen;i++)nd[i]=Math.random()*2-1;
    const ns=ac.createBufferSource();ns.buffer=nBuf;
    const nf=ac.createBiquadFilter();nf.type='bandpass';nf.frequency.value=6000;nf.Q.value=5;
    const ng=ac.createGain();ng.gain.setValueAtTime(0.1,ct);ng.gain.exponentialRampToValueAtTime(0.001,ct+0.08);
    ns.connect(nf).connect(ng).connect(dry);ns.start(ct);ns.stop(ct+0.1);

    // Buzz swell at split
    const bsw=ac.createOscillator();bsw.type='sawtooth';
    bsw.frequency.setValueAtTime(110,ct);bsw.frequency.exponentialRampToValueAtTime(55,ct+0.6);
    const bswF=ac.createBiquadFilter();bswF.type='lowpass';bswF.frequency.value=600;bswF.Q.value=3;
    const bswG=ac.createGain();
    bswG.gain.setValueAtTime(0.12,ct);bswG.gain.exponentialRampToValueAtTime(0.001,ct+0.7);
    bsw.connect(bswF).connect(bswG).connect(ac.destination);bsw.start(ct);bsw.stop(ct+0.8);

    // Sub thump
    const sub=ac.createOscillator();sub.type='sine';
    sub.frequency.setValueAtTime(80,ct);sub.frequency.exponentialRampToValueAtTime(30,ct+0.4);
    const subg=ac.createGain();
    subg.gain.setValueAtTime(0.2,ct);subg.gain.exponentialRampToValueAtTime(0.001,ct+0.5);
    sub.connect(subg).connect(ac.destination);sub.start(ct);sub.stop(ct+0.6);
  }catch(e){}
}

let t0=null, running=false;

function frame(ts) {
  if(!running) return;
  if(!t0) t0=ts;
  const t=(ts-t0)/1000;
  ctx.clearRect(0,0,W,H);

  const vg=ctx.createRadialGradient(W/2,H/2,H*0.15,W/2,H/2,H*0.85);
  vg.addColorStop(0,'rgba(8,5,10,0)');vg.addColorStop(1,'rgba(3,2,5,0.75)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.04)';
  for(let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);

  if(t<T.SS+0.3){
    const fadeA=easeOut(clamp((t-T.FI)/(T.FE-T.FI),0,1));
    const pt=clamp((t-T.PS)/(T.PE-T.PS),0,1);
    const pulse=1+0.35*Math.sin(pt*Math.PI*3.5)*(1-pt*0.7);
    const sf=t>=T.SS?1-easeIn(clamp((t-T.SS)/0.3,0,1)):1;
    drawCell(ALL,masterX,masterY,fadeA*sf,pulse*0.6);
  }

  if(t>=T.SS){
    const sd=T.SE-T.SS;
    for(const lt of letters){
      const p=easeIO(clamp((t-T.SS-lt.delay)/sd,0,1));
      const cx=lt.srcX+(lt.dstX-lt.srcX)*p;
      drawCell(lt.segs,cx,lt.y,0.3+0.7*p,0.2+0.6*p);
    }
    const df=1-easeIn(clamp((t-T.SS)/0.5,0,1));
    if(df>0.01) drawCell(deadSegs,masterX,masterY,df*0.6,0.15*df);
  }

  if(t>T.SE){
    const lp=clamp((t-T.SE)/(T.GLOW-T.SE),0,1);
    const gb=0.5+0.5*Math.sin(lp*Math.PI);
    const breathe=t>T.GLOW?0.4+0.12*Math.sin(t*1.8):gb;
    for(const lt of letters) drawCell(lt.segs,lt.dstX,lt.y,1,breathe);
  }

  document.getElementById('hint').style.opacity=t>T.HOLD?'1':'0';
  requestAnimationFrame(frame);
}

function start(){
  running=false;t0=null;
  build();running=true;playAudio();
  requestAnimationFrame(frame);
}

cvs.addEventListener('click',start);
start();
})();
</script>
</body>
</html>
